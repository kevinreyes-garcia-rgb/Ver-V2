<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IncogTube GOD</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
header{background:#202020;padding:10px;display:flex;justify-content:space-between;align-items:center}
button{cursor:pointer}

.container{max-width:1200px;margin:auto;padding:10px}
.search-bar{display:flex;gap:10px;margin:10px 0}
input{flex:1;padding:10px;border-radius:10px;border:none}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#1f1f1f;border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:scale(1.03)}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover}
.info{padding:8px}
.title{font-size:.9rem;font-weight:bold}
.channel{font-size:.8rem;color:#aaa}

.player{display:none;margin-bottom:15px}
iframe{width:100%;height:400px;border:none;border-radius:10px}

.panel{position:fixed;top:0;right:-260px;width:260px;height:100%;background:#222;padding:15px;transition:.3s;z-index:20}
.panel.active{right:0}
.panel button{display:block;width:100%;margin:10px 0;padding:10px;border:none;border-radius:8px;background:#444;color:#fff}

.comment-box{margin-top:10px}
.comment{background:#222;padding:6px;margin:5px 0;border-radius:6px;display:flex;justify-content:space-between}
.like{color:red;font-weight:bold;margin-top:5px}

.user{font-size:.8rem;color:#0f0}
</style>
</head>

<body>
<header>
<h2>IncogTube GOD</h2>
<button onclick="togglePanel()">⚙️</button>
</header>

<div class="panel" id="panel">
<button onclick="setUser()">👤 Cambiar nombre</button>
<button onclick="alert('Ranking próximamente')">🏆 Clasificación</button>
<button onclick="logout()">🚪 Cerrar sesión</button>
</div>

<div class="container">
<div class="search-bar">
<input id="q" placeholder="Buscar videos...">
<button onclick="buscar()">Buscar</button>
</div>

<div id="player" class="player"></div>

<div id="videoActions"></div>

<div class="comment-box" id="comments"></div>
<input id="commentInput" placeholder="Comentar...">
<button onclick="addComment()">Enviar</button>

<div id="results" class="grid"></div>
</div>

<script>
const API_KEY = "PON_TU_API_KEY";
let currentVideo = null;
let user = localStorage.getItem('user') || 'Anon';

function togglePanel(){
 document.getElementById('panel').classList.toggle('active');
}

function setUser(){
 const name = prompt('Tu nombre:');
 if(name){
 localStorage.setItem('user',name);
 user=name;
 }
}

function logout(){
 localStorage.clear();
 location.reload();
}

async function buscar(){
 const q=document.getElementById('q').value;
 const resBox=document.getElementById('results');
 resBox.innerHTML='Buscando...';

 const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${q}&maxResults=12&key=${API_KEY}`;

 try{
 const res=await fetch(url);
 const data=await res.json();

 resBox.innerHTML=data.items.map(v=>{
 const id=v.id.videoId;
 return `
 <div class="card" onclick="play('${id}')">
 <img class="thumb" src="${v.snippet.thumbnails.medium.url}">
 <div class="info">
 <div class="title">${v.snippet.title}</div>
 <div class="channel">${v.snippet.channelTitle}</div>
 </div>
 </div>`;
 }).join('');

 }catch(e){
 resBox.innerHTML='Error cargando videos';
 }
}

function play(id){
 currentVideo=id;
 const p=document.getElementById('player');
 p.style.display='block';
 p.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;

 renderActions();
 loadComments();
 window.scrollTo(0,0);
}

function renderActions(){
 let likes = localStorage.getItem('like_'+currentVideo) || 0;
 document.getElementById('videoActions').innerHTML = `
 <div class="like">❤️ Likes: ${likes}</div>
 <button onclick="likeVideo()">Dar like</button>
 `;
}

function likeVideo(){
 let likes = parseInt(localStorage.getItem('like_'+currentVideo) || 0);
 likes++;
 localStorage.setItem('like_'+currentVideo, likes);
 renderActions();
}

function addComment(){
 const input=document.getElementById('commentInput');
 if(!input.value)return;

 let comments=JSON.parse(localStorage.getItem(currentVideo)||"[]");
 comments.push({user,text:input.value});
 localStorage.setItem(currentVideo,JSON.stringify(comments));
 input.value='';
 loadComments();
}

function deleteComment(index){
 let comments=JSON.parse(localStorage.getItem(currentVideo)||"[]");
 comments.splice(index,1);
 localStorage.setItem(currentVideo,JSON.stringify(comments));
 loadComments();
}

function loadComments(){
 const box=document.getElementById('comments');
 let comments=JSON.parse(localStorage.getItem(currentVideo)||"[]");
 box.innerHTML=comments.map((c,i)=>`
 <div class='comment'>
 <span><span class='user'>${c.user}:</span> ${c.text}</span>
 <button onclick='deleteComment(${i})'>❌</button>
 </div>
 `).join('');
}

</script>

</body>
</html>
